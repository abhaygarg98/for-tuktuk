<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I miss you</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at 15% 20%, rgba(255, 255, 255, 0.55) 0%, rgba(255, 255, 255, 0) 34%),
                radial-gradient(circle at 85% 25%, rgba(255, 182, 193, 0.55) 0%, rgba(255, 182, 193, 0) 36%),
                radial-gradient(circle at 50% 85%, rgba(255, 214, 224, 0.5) 0%, rgba(255, 214, 224, 0) 35%),
                linear-gradient(135deg, #ffd1dc 0%, #ffe6ee 45%, #fff3f7 100%);
            margin: 0;
            overflow: hidden;
            background-size: cover;
            background-attachment: fixed;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.92);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        h1 { color: #d63384; }

        .buttons {
            margin-top: 30px;
            position: relative;
            height: 100px;
            width: 300px;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
        }

        #noBtn {
            background-color: #6c757d;
            color: white;
            position: absolute;
            left: 170px;
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <h1 id="question">Uncle miss Tuktuk?</h1>
        <div class="buttons">
            <button id="yesBtn">Yes! ❤️</button>
            <button id="noBtn">No 💔</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const container = document.getElementById('mainContainer');

        // Function to move the "No" button
        noBtn.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
            noBtn.style.position = 'fixed';
        });

        // What happens when she clicks Yes
        yesBtn.addEventListener('click', () => {
            container.innerHTML = `
                <h1>Told ya! 💞</h1>
                <p>Knew you'd believe me 😉</p>
                <svg viewBox="0 0 520 300" role="img" aria-label="Man holding flowers for his loved lady" style="width:100%; max-width:460px; border-radius:12px; box-shadow:0 8px 18px rgba(214, 51, 132, 0.25); background:linear-gradient(180deg,#fff7fb 0%,#ffe6ef 100%);">
                    <rect x="0" y="0" width="520" height="300" fill="transparent" />
                    <ellipse cx="260" cy="275" rx="180" ry="16" fill="rgba(214,51,132,0.18)"/>

                    <circle cx="170" cy="105" r="30" fill="#ffd7c2"/>
                    <rect x="145" y="136" width="50" height="78" rx="16" fill="#3f4e8c"/>
                    <rect x="128" y="146" width="18" height="62" rx="9" fill="#ffd7c2"/>
                    <rect x="194" y="146" width="18" height="62" rx="9" fill="#ffd7c2"/>
                    <rect x="154" y="212" width="16" height="56" rx="8" fill="#2f3a66"/>
                    <rect x="172" y="212" width="16" height="56" rx="8" fill="#2f3a66"/>

                    <circle cx="350" cy="110" r="30" fill="#ffe0cc"/>
                    <rect x="325" y="140" width="50" height="76" rx="16" fill="#c94f7c"/>
                    <rect x="306" y="150" width="18" height="60" rx="9" fill="#ffe0cc"/>
                    <rect x="376" y="150" width="18" height="60" rx="9" fill="#ffe0cc"/>
                    <rect x="334" y="214" width="16" height="54" rx="8" fill="#8b2f52"/>
                    <rect x="352" y="214" width="16" height="54" rx="8" fill="#8b2f52"/>

                    <path d="M200 175 C225 155, 255 150, 286 175" stroke="#3d9b5f" stroke-width="5" fill="none"/>
                    <line x1="246" y1="173" x2="246" y2="135" stroke="#3d9b5f" stroke-width="4"/>
                    <line x1="228" y1="171" x2="228" y2="140" stroke="#3d9b5f" stroke-width="4"/>
                    <line x1="264" y1="171" x2="264" y2="142" stroke="#3d9b5f" stroke-width="4"/>

                    <circle cx="246" cy="130" r="13" fill="#ff4d6d"/>
                    <circle cx="228" cy="136" r="11" fill="#ff7a8f"/>
                    <circle cx="264" cy="138" r="11" fill="#ff7a8f"/>
                    <circle cx="240" cy="122" r="8" fill="#ff8fa3"/>
                    <circle cx="252" cy="121" r="8" fill="#ff8fa3"/>

                    <path d="M170 65 C176 56, 188 56, 194 65 C200 74, 188 84, 182 90 C176 84, 164 74, 170 65 Z" fill="#ff4d6d"/>
                    <path d="M340 66 C346 57, 358 57, 364 66 C370 75, 358 85, 352 91 C346 85, 334 75, 340 66 Z" fill="#ff4d6d"/>

                    <text x="260" y="35" text-anchor="middle" font-size="20" font-family="Segoe UI, sans-serif" fill="#c43d70">For You, My Love 💐</text>
                </svg>
            `;
        });
    </script>
</body>
</html>
