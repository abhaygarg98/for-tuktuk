<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I miss you</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at 15% 20%, rgba(255, 255, 255, 0.55) 0%, rgba(255, 255, 255, 0) 34%),
                radial-gradient(circle at 85% 25%, rgba(255, 182, 193, 0.55) 0%, rgba(255, 182, 193, 0) 36%),
                radial-gradient(circle at 50% 85%, rgba(255, 214, 224, 0.5) 0%, rgba(255, 214, 224, 0) 35%),
                linear-gradient(135deg, #ffd1dc 0%, #ffe6ee 45%, #fff3f7 100%);
            margin: 0;
            overflow: hidden;
            background-size: cover;
            background-attachment: fixed;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.92);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        h1 { color: #d63384; }

        .buttons {
            margin-top: 30px;
            position: relative;
            height: 100px;
            width: 300px;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
        }

        #noBtn {
            background-color: #6c757d;
            color: white;
            position: absolute;
            left: 170px;
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <h1 id="question">Uncle miss Tuktuk?</h1>
        <div class="buttons">
            <button id="yesBtn">Yes! ❤️</button>
            <button id="noBtn">No 💔</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const container = document.getElementById('mainContainer');

        // Function to move the "No" button
        noBtn.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
            noBtn.style.position = 'fixed';
        });

        // What happens when she clicks Yes
        yesBtn.addEventListener('click', () => {
            container.innerHTML = `
                <h1>Told ya! 💞</h1>
                <p>Knew you'd believe me 😉</p>
                <img src="https://images.pexels.com/photos/708392/pexels-photo-708392.jpeg?auto=compress&cs=tinysrgb&w=1200" alt="Friends Celebration" style="width:100%; max-width:460px; border-radius:12px; box-shadow:0 8px 18px rgba(214, 51, 132, 0.25);" onerror="this.onerror=null;this.src='https://images.unsplash.com/photo-1529156069898-49953e39b3ac?auto=format&fit=crop&w=1200&q=80';">
            `;
        });
    </script>
</body>
</html>
