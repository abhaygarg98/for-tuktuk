<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Cuteness Poll</title>
	<style>
		:root {
			--pink: #ff4d8d;
			--pink-soft: #ffd9e8;
			--bg1: #fff3f8;
			--bg2: #ffe6f1;
			--text: #5b2440;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
			font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
			color: var(--text);
			background:
				radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.8), transparent 35%),
				radial-gradient(circle at 90% 10%, rgba(255, 182, 210, 0.6), transparent 33%),
				linear-gradient(135deg, var(--bg1), var(--bg2));
			padding: 20px;
		}

		.card {
			width: min(700px, 95vw);
			background: rgba(255, 255, 255, 0.93);
			border: 1px solid rgba(255, 255, 255, 0.9);
			border-radius: 24px;
			box-shadow: 0 14px 30px rgba(214, 51, 132, 0.18);
			padding: 32px 24px;
			text-align: center;
		}

		h1 {
			margin: 0 0 10px;
			font-size: clamp(1.5rem, 2.5vw, 2.2rem);
		}

		p {
			margin: 0;
			font-size: 1.05rem;
		}

		.actions {
			display: flex;
			justify-content: center;
			gap: 14px;
			margin-top: 24px;
			flex-wrap: wrap;
		}

		button {
			border: none;
			border-radius: 12px;
			padding: 12px 24px;
			font-size: 1rem;
			font-weight: 600;
			cursor: pointer;
			transition: transform .15s ease, opacity .2s ease;
		}

		button:hover {
			transform: translateY(-2px);
		}

		#yesBtn {
			background: var(--pink);
			color: #fff;
		}

		#noBtn {
			background: #7a6a74;
			color: #fff;
		}

		.hidden {
			display: none !important;
		}

		.loader-wrap {
			margin-top: 26px;
		}

		.meter {
			width: min(520px, 92%);
			margin: 14px auto 8px;
			background: #f5d3e2;
			border-radius: 999px;
			height: 24px;
			overflow: hidden;
			box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.12);
		}

		.bar {
			height: 100%;
			width: 0%;
			background: linear-gradient(90deg, #ff669d, #ff2d7a);
			transition: width .25s linear;
		}

		.percent {
			font-weight: 700;
			font-size: 1.1rem;
			margin-top: 8px;
		}

		.result {
			margin-top: 20px;
		}

		.art {
			width: min(460px, 100%);
			margin: 16px auto 0;
			display: block;
			border-radius: 14px;
			box-shadow: 0 10px 24px rgba(91, 36, 64, 0.2);
		}
	</style>
</head>
<body>
	<main class="card" id="card">
		<h1 id="questionTitle">Let's calculate your cuteness? 💗</h1>
		<p id="questionSubtitle">Pick one option below.</p>

		<div class="actions" id="actions">
			<button id="yesBtn">Yes</button>
			<button id="noBtn">No</button>
		</div>

		<section id="loaderSection" class="loader-wrap hidden">
			<p>Analyzing cuteness levels... please wait ✨</p>
			<div class="meter" aria-label="cuteness loader">
				<div class="bar" id="bar"></div>
			</div>
			<div class="percent" id="percentText">0%</div>
		</section>

		<section id="result" class="result hidden"></section>
	</main>

	<script>
		const yesBtn = document.getElementById('yesBtn');
		const noBtn = document.getElementById('noBtn');
		const actions = document.getElementById('actions');
		const questionTitle = document.getElementById('questionTitle');
		const questionSubtitle = document.getElementById('questionSubtitle');
		const loaderSection = document.getElementById('loaderSection');
		const bar = document.getElementById('bar');
		const percentText = document.getElementById('percentText');
		const result = document.getElementById('result');

		const loveyArt = `
			<svg class="art" viewBox="0 0 520 280" role="img" aria-label="lovey hearts">
				<defs>
					<linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
						<stop offset="0%" stop-color="#fff7fb"/>
						<stop offset="100%" stop-color="#ffe0ef"/>
					</linearGradient>
				</defs>
				<rect x="0" y="0" width="520" height="280" fill="url(#g1)"/>
				<path d="M120 90 C120 60, 160 55, 170 80 C180 55, 220 60, 220 90 C220 120, 185 140, 170 160 C155 140, 120 120, 120 90 Z" fill="#ff4d8d"/>
				<path d="M280 100 C280 72, 315 68, 325 88 C335 68, 370 72, 370 100 C370 126, 340 144, 325 160 C310 144, 280 126, 280 100 Z" fill="#ff7cab"/>
				<path d="M380 70 C380 52, 402 49, 409 62 C416 49, 438 52, 438 70 C438 88, 419 100, 409 111 C399 100, 380 88, 380 70 Z" fill="#ff9fc2"/>
				<text x="260" y="230" text-anchor="middle" font-size="28" font-family="Segoe UI, sans-serif" fill="#b03060">You are the cutest 💕</text>
			</svg>
		`;

		const bunnyArt = `
			<svg class="art" viewBox="0 0 520 300" role="img" aria-label="tired bunny">
				<rect x="0" y="0" width="520" height="300" fill="#f7f5ff"/>
				<ellipse cx="260" cy="265" rx="120" ry="18" fill="rgba(100,80,140,0.2)"/>

				<ellipse cx="220" cy="80" rx="24" ry="58" fill="#ffffff" stroke="#d7d1ef" stroke-width="3"/>
				<ellipse cx="300" cy="80" rx="24" ry="58" fill="#ffffff" stroke="#d7d1ef" stroke-width="3"/>
				<ellipse cx="220" cy="88" rx="10" ry="38" fill="#ffd2e2"/>
				<ellipse cx="300" cy="88" rx="10" ry="38" fill="#ffd2e2"/>

				<circle cx="260" cy="155" r="78" fill="#ffffff" stroke="#d7d1ef" stroke-width="3"/>
				<ellipse cx="235" cy="150" rx="8" ry="10" fill="#5f557f"/>
				<ellipse cx="285" cy="150" rx="8" ry="10" fill="#5f557f"/>
				<circle cx="260" cy="172" r="7" fill="#ff8fb2"/>
				<path d="M246 186 Q260 198 274 186" fill="none" stroke="#5f557f" stroke-width="4" stroke-linecap="round"/>

				<text x="260" y="245" text-anchor="middle" font-size="24" font-family="Segoe UI, sans-serif" fill="#594675">I'm tired... that's beyond my limits 😵‍💫</text>
			</svg>
		`;

		noBtn.addEventListener('click', () => {
			questionTitle.classList.add('hidden');
			questionSubtitle.classList.add('hidden');
			actions.classList.add('hidden');
			loaderSection.classList.add('hidden');
			result.classList.remove('hidden');
			result.innerHTML = `
				<h2>We don't need to.</h2>
				<p>The world knows you are cutest 💖</p>
				${loveyArt}
			`;
		});

		yesBtn.addEventListener('click', () => {
			questionTitle.classList.add('hidden');
			questionSubtitle.classList.add('hidden');
			actions.classList.add('hidden');
			result.classList.add('hidden');
			loaderSection.classList.remove('hidden');

			let percent = 0;
			const id = setInterval(() => {
				percent += Math.floor(Math.random() * 4) + 2;

				if (percent >= 110) {
					percent = 110;
					clearInterval(id);
					percentText.textContent = `${percent}%`;
					bar.style.width = '100%';

					setTimeout(() => {
						loaderSection.classList.add('hidden');
						result.classList.remove('hidden');
						result.innerHTML = `
							<h2>It's beyond my limits 😮‍💨</h2>
							<p>Sorry, can't calculate.</p>
							${bunnyArt}
						`;
					}, 800);
					return;
				}

				percentText.textContent = `${percent}%`;
				bar.style.width = `${Math.min(percent, 100)}%`;
			}, 120);
		});
	</script>
</body>
</html>
